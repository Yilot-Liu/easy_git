name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:       # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.4.1'

      - name: 创建 local.properties（注入 GitHub OAuth 凭据）
        run: |
          echo "github.client.id=${{ secrets.GITHUB_CLIENT_ID }}" >> local.properties
          echo "github.client.secret=${{ secrets.GITHUB_CLIENT_SECRET }}" >> local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: 构建 Debug APK
        run: gradle assembleDebug --no-daemon

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: GitDroid-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
